<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario della Comunità — U.P. Meloncello-Ravone</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 0;
  }
  :root {
    --blu: #1a3a6b; --blu-dark: #12295a; --blu-light: #e8eef7;
    --oro: #c8973a;
    --verde: #2d7a3a; --arancio: #a33a00; --viola: #5c2d91;
    --grigio: #5a5a5a; --testo: #1c1c1c; --testo-sec: #5a5a5a;
    --bordo: #d0daea; --radius: 10px;
  }

  /* WRAPPER: si adatta alla larghezza dell'iframe */
  #cal-wrapper {
    width: 100%;
    background: white;
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(26,58,107,0.10);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;        /* occupa tutta l'altezza disponibile */
    min-height: 400px;
  }

  /* HEADER — fisso */
  #cal-header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--blu); padding: 0.85rem 1.25rem; color: white;
    flex-wrap: wrap; gap: 8px;
    flex-shrink: 0;
  }
  .header-title { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; color: white; }
  .header-sub   { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; }
  #cal-nav { display: flex; align-items: center; gap: 6px; }
  #cal-nav button {
    background: rgba(255,255,255,0.13); border: none; border-radius: 6px;
    color: white; cursor: pointer; width: 30px; height: 30px;
    font-size: 17px; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #cal-nav button:hover { background: rgba(255,255,255,0.28); }
  #cal-month-label { font-size: 14px; font-weight: 600; color: white; min-width: 130px; text-align: center; }

  /* TOGGLE — fisso */
  #view-toggle {
    display: flex; background: var(--blu-light);
    border-bottom: 1px solid var(--bordo); padding: 0 1rem;
    flex-shrink: 0;
  }
  #view-toggle button {
    background: none; border: none; padding: 0.5rem 0.9rem;
    font-size: 12px; cursor: pointer; color: var(--testo-sec);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  }
  #view-toggle button.active { color: var(--blu); border-bottom-color: var(--oro); font-weight: 600; }
  #view-toggle button:hover:not(.active) { color: var(--blu); }

  /* CORPO SCROLLABILE */
  #cal-body {
    flex: 1 1 0;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* LEGENDA — fissa in fondo */
  #cal-legend {
    display: flex; flex-wrap: wrap; gap: 8px; padding: .55rem 1rem;
    background: #f7f8fc; border-top: 1px solid var(--bordo);
    font-size: 10.5px; color: var(--testo-sec);
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-icon { font-size: 12px; }

  /* FOOTER — fisso */
  #cal-footer { text-align: center; font-size: 10px; color: rgba(255,255,255,.5); background: var(--blu); padding: .5rem 0; flex-shrink: 0; }

  /* LOADING */
  #cal-loading { padding: 2.5rem 1rem; text-align: center; color: var(--testo-sec); font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--blu-light); border-top-color: var(--blu); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══════════════════════════════════════════
     VISTA OGGI
  ══════════════════════════════════════════ */
  #oggi-view {
    display: none;
    overflow-y: auto;
    flex: 1 1 0;
    padding: 1.2rem 1.1rem;
  }
  .oggi-intestazione {
    font-size: 13px; font-weight: 700; color: var(--blu);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 1rem; text-align: center;
    border-bottom: 2px solid var(--oro); padding-bottom: .5rem;
  }
  .oggi-nessun {
    text-align: center; padding: 3rem 1rem;
    color: var(--testo-sec); font-size: 15px; line-height: 1.6;
  }
  .oggi-nessun .oggi-emoji { font-size: 40px; display: block; margin-bottom: .7rem; }

  .oggi-card {
    background: white;
    border: 1px solid var(--bordo);
    border-left: 5px solid var(--blu);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: box-shadow .15s, transform .1s;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }
  .oggi-card:hover { box-shadow: 0 4px 18px rgba(26,58,107,0.14); transform: translateY(-1px); }
  .oggi-card.festività  { border-left-color: #b8860b; }
  .oggi-card.messe      { border-left-color: var(--blu); }
  .oggi-card.preghiera  { border-left-color: #1a6b5a; }
  .oggi-card.fraternita { border-left-color: #3a1a6b; }
  .oggi-card.catechismo { border-left-color: var(--arancio); }
  .oggi-card.caritas    { border-left-color: var(--verde); }
  .oggi-card.tempo      { border-left-color: var(--viola); }
  .oggi-card.info       { border-left-color: #444; }

  .oggi-card-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
  .oggi-card-body { flex: 1; min-width: 0; }
  .oggi-card-orario {
    font-size: 20px; font-weight: 800; color: var(--blu);
    letter-spacing: .01em; line-height: 1.1; margin-bottom: .25rem;
  }
  .oggi-card-orario.tutto-giorno {
    font-size: 14px; font-weight: 700; color: var(--testo-sec);
    letter-spacing: .06em; text-transform: uppercase;
  }
  .oggi-card-titolo {
    font-size: 16px; font-weight: 700; color: var(--testo);
    margin-bottom: .2rem; line-height: 1.25;
  }
  .oggi-card-luogo {
    font-size: 12px; color: var(--testo-sec); margin-top: .25rem;
    display: flex; align-items: flex-start; gap: 4px; line-height: 1.4;
  }

  /* ══════════════════════════════════════════
     VISTA MESE (ex Lista)
  ══════════════════════════════════════════ */
  #list-view {
    display: none;
    overflow-y: auto;
    flex: 1 1 0;
    padding: .8rem 1rem;
  }
  .list-day-group { margin-bottom: 1.2rem; }
  .list-day-header {
    font-size: 18px; font-weight: 800; color: var(--blu);
    text-transform: uppercase; letter-spacing: .04em;
    border-bottom: 2px solid var(--blu-light);
    padding-bottom: 4px; margin-bottom: 8px;
  }
  .list-event {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 9px;
    border-radius: 8px; cursor: pointer; transition: background .1s; margin-bottom: 4px;
    border-left: 3px solid transparent;
  }
  .list-event:hover { background: var(--blu-light); }
  .list-event.festività  { border-left-color: #b8860b; }
  .list-event.messe      { border-left-color: var(--blu); }
  .list-event.preghiera  { border-left-color: #1a6b5a; }
  .list-event.fraternita { border-left-color: #3a1a6b; }
  .list-event.catechismo { border-left-color: var(--arancio); }
  .list-event.caritas    { border-left-color: var(--verde); }
  .list-event.tempo      { border-left-color: var(--viola); }
  .list-event.info       { border-left-color: #444; }

  .list-event-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
  .list-event-body { flex: 1; min-width: 0; }
  .list-event-orario {
    font-size: 15px; font-weight: 800; color: var(--blu);
    letter-spacing: .01em; line-height: 1.2; margin-bottom: 2px;
  }
  .list-event-orario.tutto-giorno {
    font-size: 11px; font-weight: 700; color: var(--testo-sec);
    text-transform: uppercase; letter-spacing: .07em;
  }
  .list-event-title { font-size: 14px; font-weight: 600; color: var(--testo); line-height: 1.3; }
  .list-event-luogo { font-size: 11.5px; color: var(--testo-sec); margin-top: 3px; line-height: 1.4; }

  /* ══════════════════════════════════════════
     VISTA GRIGLIA — scrollabile
  ══════════════════════════════════════════ */
  #grid-view {
    display: none;
    overflow: auto;          /* scroll X e Y */
    flex: 1 1 0;
    -webkit-overflow-scrolling: touch;
  }
  .grid-inner {
    min-width: 560px;        /* larghezza minima per leggere 7 colonne */
  }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--blu-light); border-bottom: 1px solid var(--bordo);
    position: sticky; top: 0; z-index: 2;
  }
  .cal-weekdays div {
    text-align: center; padding: .4rem 0; font-size: 10px; font-weight: 700;
    color: var(--blu); text-transform: uppercase; letter-spacing: .05em;
  }
  .cal-weekdays div.domenica { color: var(--oro); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day {
    border-right: .5px solid #e5ecf5; border-bottom: .5px solid #e5ecf5;
    min-height: 80px; padding: 5px 4px 3px; position: relative;
  }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day.altro-mese { background: #fafbfd; }
  .cal-day.altro-mese .day-num { color: #c0c8d8; }
  .cal-day.oggi { background: #fffbf2; }
  .cal-day.oggi .day-num {
    background: var(--oro); color: white; border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center;
    justify-content: center; font-weight: 700;
  }
  .cal-day.domenica .day-num { color: var(--oro); font-weight: 600; }
  .day-num {
    font-size: 11.5px; color: var(--testo); width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 2px;
  }
  .day-events { display: flex; flex-direction: column; gap: 2px; }
  .event-pill {
    font-size: 9.5px; line-height: 1.4; padding: 1px 4px; border-radius: 3px;
    color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; transition: opacity .1s; display: flex; align-items: center; gap: 3px;
  }
  .event-pill:hover { opacity: .82; }
  .event-pill.continua-sx { border-radius: 0 3px 3px 0; padding-left: 2px; }
  .event-pill.continua-dx { border-radius: 3px 0 0 3px; padding-right: 2px; }
  .event-pill.continua-entrambi { border-radius: 0; }
  .event-pill .pill-icon { font-size: 9px; flex-shrink: 0; }
  .event-pill.festività  { background: #b8860b; }
  .event-pill.messe      { background: var(--blu); }
  .event-pill.preghiera  { background: #1a6b5a; }
  .event-pill.fraternita { background: #3a1a6b; }
  .event-pill.catechismo { background: var(--arancio); }
  .event-pill.caritas    { background: var(--verde); }
  .event-pill.tempo      { background: var(--viola); }
  .event-pill.info       { background: #444; }
  .more-events { font-size: 9px; color: var(--testo-sec); padding: 1px 3px; cursor: pointer; }

  /* POPUP */
  #popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 998; }
  #event-popup {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%); background: white; border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18); padding: 1.3rem 1.5rem;
    z-index: 999; width: 90%; max-width: 360px; border-top: 4px solid var(--blu);
  }
  #event-popup h4 { font-size: 15px; font-weight: 700; color: var(--blu); margin-bottom: .4rem; padding-right: 1.5rem; }
  .popup-row { font-size: 13px; color: var(--testo-sec); margin-bottom: 3px; line-height: 1.5; }
  #popup-close { position: absolute; top: 10px; right: 14px; background: none; border: none; cursor: pointer; font-size: 22px; color: var(--testo-sec); }

  @media (max-width: 500px) {
    .cal-day { min-height: 50px; padding: 3px 2px; }
    .event-pill { font-size: 8.5px; }
    .pill-icon { display: none; }
    #cal-month-label { min-width: 100px; font-size: 12px; }
    .header-title { font-size: 12px; }
    .oggi-card-orario { font-size: 17px; }
    .oggi-card-titolo { font-size: 14px; }
    .list-day-header { font-size: 15px; }
  }
</style>
</head>
<body>
<div id="cal-wrapper">

  <!-- HEADER FISSO -->
  <div id="cal-header">
    <div>
      <div class="header-title">CALENDARIO DELLA COMUNITÀ</div>
      <div class="header-sub">Zona Pastorale MERA · Bologna</div>
    </div>
    <div id="cal-nav">
      <button id="btn-prev">‹</button>
      <div id="cal-month-label">—</div>
      <button id="btn-next">›</button>
    </div>
  </div>

  <!-- TOGGLE FISSO — ordine: Oggi · Mese · Griglia -->
  <div id="view-toggle">
    <button id="btn-oggi-btn">Oggi</button>
    <button id="btn-list">Mese</button>
    <button id="btn-grid">Griglia</button>
  </div>

  <!-- CORPO SCROLLABILE -->
  <div id="cal-body">
    <div id="cal-loading"><div class="spinner"></div>Caricamento eventi…</div>

    <!-- OGGI -->
    <div id="oggi-view"></div>

    <!-- MESE (lista) -->
    <div id="list-view"></div>

    <!-- GRIGLIA -->
    <div id="grid-view">
      <div class="grid-inner">
        <div class="cal-weekdays">
          <div class="domenica">Dom</div>
          <div>Lun</div><div>Mar</div><div>Mer</div>
          <div>Gio</div><div>Ven</div><div>Sab</div>
        </div>
        <div class="cal-grid" id="cal-cells"></div>
      </div>
    </div>
  </div>

  <!-- LEGENDA FISSA -->
  <div id="cal-legend">
    <div class="legend-item"><span class="legend-icon">📋</span> Info UP</div>
    <div class="legend-item"><span class="legend-icon">⭐</span> Festività</div>
    <div class="legend-item"><span class="legend-icon">⛪</span> Messe</div>
    <div class="legend-item"><span class="legend-icon">🙏</span> Preghiera</div>
    <div class="legend-item"><span class="legend-icon">👥</span> Fraternità</div>
    <div class="legend-item"><span class="legend-icon">📚</span> Catechismo</div>
    <div class="legend-item"><span class="legend-icon">❤️</span> Caritas</div>
    <div class="legend-item"><span class="legend-icon">🎭</span> Tempo libero</div>
  </div>

  <!-- FOOTER FISSO -->
  <div id="cal-footer">zonapastoralemera.org</div>
</div>

<div id="popup-overlay"></div>
<div id="event-popup">
  <button id="popup-close">×</button>
  <h4 id="popup-title"></h4>
  <div class="popup-row" id="popup-cat"></div>
  <div class="popup-row" id="popup-date"></div>
  <div class="popup-row" id="popup-time"></div>
  <div class="popup-row" id="popup-loc"></div>
  <div class="popup-row" id="popup-desc"></div>
</div>

<script>
const CALENDARI = [
  { id: 'info@zonapastoralemera.org',                                                                    nome: 'Info UP',      classe: 'info',       icon: '📋' },
  { id: 'c_b455bc57387a5c5faaa42e9684fde524760b588945622a2bcdd98f968f130347@group.calendar.google.com', nome: 'Festività',    classe: 'festività',  icon: '⭐' },
  { id: 'c_b80be427683a0e1224a0f8a8ccdad245e53314ce4c5d0756ac3d0fe7f39c8b90@group.calendar.google.com', nome: 'Messe',        classe: 'messe',      icon: '⛪' },
  { id: 'c_9c7e450ddfd109ef1507027ce8c7d3ba8594cf826f43e1a9e1c1d359fcefaa42@group.calendar.google.com', nome: 'Preghiera',    classe: 'preghiera',  icon: '🙏' },
  { id: 'c_403fbd4a7b8315233eee4790cff334596f3b992c8e30519f82c4abfd324efaf1@group.calendar.google.com', nome: 'Fraternità',   classe: 'fraternita', icon: '👥' },
  { id: 'c_7e5f3c1c5e81b0e3a41ad216f1a92a68e4691b7f0bbd7323b71292207a6ff871@group.calendar.google.com', nome: 'Catechismo',   classe: 'catechismo', icon: '📚' },
  { id: 'c_f34b010b4636290c886658f13c45b93ca8c0481fc62d46ec7d5a3824e5e218bf@group.calendar.google.com', nome: 'Caritas',      classe: 'caritas',    icon: '❤️' },
  { id: 'c_1941933579b8ca22ba3fae59aa099c265b7b2cb392e16713b236363c51c55660@group.calendar.google.com', nome: 'Tempo libero', classe: 'tempo',      icon: '🎭' },
];

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
              'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI_LONG = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];

const API_KEY = 'AIzaSyBRoKXJaV84XCJezZvsZT33fz_5J2urTKM';

let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let allEvents    = [];
let currentView  = 'oggi'; // default: Oggi

function updateLabel() {
  document.getElementById('cal-month-label').textContent = MESI[currentMonth] + ' ' + currentYear;
}

function fmtData(dt) {
  if (!dt) return '';
  return new Date(dt.dateTime || dt.date)
    .toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function fmtOra(dt) {
  if (!dt || !dt.dateTime) return 'Tutto il giorno';
  return new Date(dt.dateTime).toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}
function isTuttoIlGiorno(ev) {
  return !ev.start.dateTime;
}

function toDateStr(dt) {
  if (!dt) return null;
  if (dt.date) return dt.date;
  return new Date(dt.dateTime).toISOString().slice(0,10);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10);
}
function cellDateStr(year, month, day) {
  return year + '-' + String(month+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
}

// Naviga prev/next: non disponibile in vista Oggi (rimane nel mese corrente)
document.getElementById('btn-prev').addEventListener('click', () => {
  currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  updateLabel(); loadEvents();
});
document.getElementById('btn-next').addEventListener('click', () => {
  currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  updateLabel(); loadEvents();
});

async function loadEvents() {
  document.getElementById('cal-loading').style.display  = 'block';
  document.getElementById('oggi-view').style.display    = 'none';
  document.getElementById('grid-view').style.display    = 'none';
  document.getElementById('list-view').style.display    = 'none';

  const start = new Date(currentYear, currentMonth, 1).toISOString();
  const end   = new Date(currentYear, currentMonth + 1, 0, 23, 59, 59).toISOString();

  try {
    const promises = CALENDARI.map(cal => {
      const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`
        + `?key=${API_KEY}`
        + `&timeMin=${encodeURIComponent(start)}`
        + `&timeMax=${encodeURIComponent(end)}`
        + `&singleEvents=true&orderBy=startTime&maxResults=250`;
      return fetch(url).then(r => r.json()).then(data => {
        if (data.error) return [];
        return (data.items || []).map(ev => ({ ...ev, _classe: cal.classe, _calNome: cal.nome, _icon: cal.icon }));
      }).catch(() => []);
    });
    const results = await Promise.all(promises);
    allEvents = results.flat().sort((a,b) => {
      return new Date(a.start.dateTime||a.start.date) - new Date(b.start.dateTime||b.start.date);
    });
    renderCurrent();
  } catch(e) {
    document.getElementById('cal-loading').style.display = 'none';
  }
}

function renderCurrent() {
  document.getElementById('cal-loading').style.display = 'none';
  document.getElementById('oggi-view').style.display   = 'none';
  document.getElementById('grid-view').style.display   = 'none';
  document.getElementById('list-view').style.display   = 'none';

  if (currentView === 'oggi')  renderOggi();
  else if (currentView === 'grid') renderGrid();
  else renderList();
}

/* ══════════════════════════════════════════
   VISTA OGGI
══════════════════════════════════════════ */
function renderOggi() {
  const ov = document.getElementById('oggi-view');
  ov.style.display = 'flex';
  ov.style.flexDirection = 'column';
  ov.innerHTML = '';

  const oggi = new Date();
  const oggiStr = oggi.toISOString().slice(0,10);

  // intestazione data
  const intestazione = document.createElement('div');
  intestazione.className = 'oggi-intestazione';
  const giorno = GIORNI_LONG[oggi.getDay()];
  const dd = oggi.getDate();
  const mm = MESI[oggi.getMonth()];
  const aa = oggi.getFullYear();
  intestazione.textContent = giorno.charAt(0).toUpperCase() + giorno.slice(1) + ', ' + dd + ' ' + mm + ' ' + aa;
  ov.appendChild(intestazione);

  // filtra eventi di oggi
  const evOggi = allEvents.filter(ev => {
    const start = toDateStr(ev.start);
    let end = toDateStr(ev.end);
    if (ev.end && ev.end.date) end = addDays(end, -1);
    return start <= oggiStr && oggiStr <= end;
  });

  // se siamo in un mese diverso da oggi, carica separatamente
  if (currentYear !== oggi.getFullYear() || currentMonth !== oggi.getMonth()) {
    ov.innerHTML = '';
    ov.appendChild(intestazione);
    const msg = document.createElement('div');
    msg.className = 'oggi-nessun';
    msg.innerHTML = '<span class="oggi-emoji">📅</span>Stai guardando un mese diverso.<br>Gli appuntamenti di oggi si trovano nel mese corrente.';
    ov.appendChild(msg);
    return;
  }

  if (!evOggi.length) {
    const nessun = document.createElement('div');
    nessun.className = 'oggi-nessun';
    nessun.innerHTML = '<span class="oggi-emoji">☀️</span>Nessun appuntamento programmato per oggi.';
    ov.appendChild(nessun);
    return;
  }

  // ordina: prima con orario, poi tutto-il-giorno
  evOggi.sort((a,b) => {
    const aHasTime = !!a.start.dateTime;
    const bHasTime = !!b.start.dateTime;
    if (aHasTime && !bHasTime) return -1;
    if (!aHasTime && bHasTime) return 1;
    return new Date(a.start.dateTime||a.start.date) - new Date(b.start.dateTime||b.start.date);
  });

  const adesso = new Date();

  evOggi.forEach(ev => {
    // Determina se l'evento è già concluso
    const endDt = ev.end ? new Date(ev.end.dateTime || ev.end.date) : null;
    const concluso = endDt && endDt < adesso && !!ev.end.dateTime; // solo se ha orario preciso

    const card = document.createElement('div');
    card.className = 'oggi-card ' + ev._classe;

    const iconDiv = document.createElement('div');
    iconDiv.className = 'oggi-card-icon';
    iconDiv.textContent = ev._icon;

    const body = document.createElement('div');
    body.className = 'oggi-card-body';

    const orario = document.createElement('div');
    const tuttoGiorno = isTuttoIlGiorno(ev);
    if (!tuttoGiorno) {
      orario.className = 'oggi-card-orario';
      orario.textContent = fmtOra(ev.start);
      body.appendChild(orario);
    }

    const titolo = document.createElement('div');
    titolo.className = 'oggi-card-titolo';
    titolo.textContent = ev.summary || '(senza titolo)';

    body.appendChild(orario);
    body.appendChild(titolo);

    if (ev.location) {
      const luogo = document.createElement('div');
      luogo.className = 'oggi-card-luogo';
      luogo.textContent = '📍 ' + ev.location;
      body.appendChild(luogo);
    }

    card.appendChild(iconDiv);
    card.appendChild(body);
    card.addEventListener('click', () => showPopup(ev));
    ov.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   VISTA MESE (lista)
══════════════════════════════════════════ */
function renderList() {
  const lv = document.getElementById('list-view');
  lv.style.display = 'block';
  lv.innerHTML = '';

  if (!allEvents.length) {
    lv.innerHTML = '<p style="font-size:13px;color:#5a5a5a;padding:1.5rem 0;text-align:center">Nessun evento in questo mese.</p>';
    return;
  }

  const oggi = new Date(); oggi.setHours(0,0,0,0);

  const grouped = {};
  const groupOrder = [];

  allEvents.forEach(ev => {
    const dataEv = new Date(ev.start.dateTime || ev.start.date);
    dataEv.setHours(0,0,0,0);
    // Nel mese corrente mostra solo da oggi in poi
    const isMeseCorrente = currentYear === new Date().getFullYear() && currentMonth === new Date().getMonth();
    if (isMeseCorrente && dataEv < oggi) return;

    const keyRaw = new Date(ev.start.dateTime || ev.start.date);
    const key = keyRaw.toISOString().slice(0,10);
    const label = new Date(ev.start.dateTime || ev.start.date)
      .toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();

    if (!grouped[key]) { grouped[key] = { label, events: [] }; groupOrder.push(key); }
    grouped[key].events.push(ev);
  });

  groupOrder.forEach(key => {
    const { label, events } = grouped[key];
    const grp = document.createElement('div');
    grp.className = 'list-day-group';

    const hdr = document.createElement('div');
    hdr.className = 'list-day-header';
    hdr.textContent = label;
    grp.appendChild(hdr);

    events.forEach(ev => {
      const row = document.createElement('div');
      row.className = 'list-event ' + ev._classe;

      const iconDiv = document.createElement('div');
      iconDiv.className = 'list-event-icon';
      iconDiv.textContent = ev._icon;

      const body = document.createElement('div');
      body.className = 'list-event-body';

      const tuttoGiorno = isTuttoIlGiorno(ev);
      if (!tuttoGiorno) {
        const orario = document.createElement('div');
        orario.className = 'list-event-orario';
        orario.textContent = fmtOra(ev.start);
        body.appendChild(orario);
      }

      const titolo = document.createElement('div');
      titolo.className = 'list-event-title';
      titolo.textContent = ev.summary || '(senza titolo)';

      body.appendChild(titolo);

      if (ev.location) {
        const luogo = document.createElement('div');
        luogo.className = 'list-event-luogo';
        luogo.textContent = '📍 ' + ev.location;
        body.appendChild(luogo);
      }

      row.appendChild(iconDiv);
      row.appendChild(body);
      row.addEventListener('click', () => showPopup(ev));
      grp.appendChild(row);
    });

    lv.appendChild(grp);
  });
}

/* ══════════════════════════════════════════
   VISTA GRIGLIA
══════════════════════════════════════════ */
function renderGrid() {
  document.getElementById('grid-view').style.display = 'block';
  const cells = document.getElementById('cal-cells');
  cells.innerHTML = '';

  const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev  = new Date(currentYear, currentMonth, 0).getDate();
  const today       = new Date();

  function eventsForDay(dayStr) {
    return allEvents.filter(ev => {
      const start = toDateStr(ev.start);
      let end = toDateStr(ev.end);
      if (ev.end && ev.end.date) end = addDays(end, -1);
      return start <= dayStr && dayStr <= end;
    });
  }

  for (let i = firstDay - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'cal-day altro-mese';
    cell.innerHTML = `<div class="day-num">${daysInPrev - i}</div>`;
    cells.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dow     = new Date(currentYear, currentMonth, d).getDay();
    const isToday = currentYear === today.getFullYear() && currentMonth === today.getMonth() && d === today.getDate();
    const cell    = document.createElement('div');
    cell.className = 'cal-day' + (dow === 0 ? ' domenica' : '') + (isToday ? ' oggi' : '');

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = d;
    cell.appendChild(numDiv);

    const dayStr = cellDateStr(currentYear, currentMonth, d);
    const evs    = eventsForDay(dayStr);
    const evDiv  = document.createElement('div');
    evDiv.className = 'day-events';

    evs.slice(0, 3).forEach(ev => {
      const startStr = toDateStr(ev.start);
      let endStr = toDateStr(ev.end);
      if (ev.end && ev.end.date) endStr = addDays(endStr, -1);
      const isMulti       = startStr !== endStr;
      const isContinuaSx  = isMulti && dayStr > startStr;
      const isContinuaDx  = isMulti && dayStr < endStr;

      const pill = document.createElement('div');
      let extraClass = '';
      if (isContinuaSx && isContinuaDx) extraClass = ' continua-entrambi';
      else if (isContinuaSx) extraClass = ' continua-sx';
      else if (isContinuaDx) extraClass = ' continua-dx';
      pill.className = 'event-pill ' + ev._classe + extraClass;

      if (!isContinuaSx) {
        const icon = document.createElement('span');
        icon.className = 'pill-icon';
        icon.textContent = ev._icon;
        pill.appendChild(icon);
        const txt = document.createElement('span');
        txt.textContent = ev.summary || '(senza titolo)';
        pill.appendChild(txt);
      } else {
        pill.textContent = '▸ ' + (ev.summary || '');
      }
      pill.title = ev.summary;
      pill.addEventListener('click', () => showPopup(ev));
      evDiv.appendChild(pill);
    });

    if (evs.length > 3) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = '+' + (evs.length - 3) + ' altri';
      evDiv.appendChild(more);
    }
    cell.appendChild(evDiv);
    cells.appendChild(cell);
  }

  const totalCells = firstDay + daysInMonth;
  const remainder  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remainder; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day altro-mese';
    cell.innerHTML = `<div class="day-num">${d}</div>`;
    cells.appendChild(cell);
  }
}

/* ══════════════════════════════════════════
   POPUP
══════════════════════════════════════════ */
function showPopup(ev) {
  document.getElementById('popup-title').textContent = ev.summary || '(senza titolo)';
  document.getElementById('popup-cat').textContent   = ev._icon + ' ' + ev._calNome;
  document.getElementById('popup-date').textContent  = fmtData(ev.start);
  document.getElementById('popup-time').textContent  = fmtOra(ev.start);
  document.getElementById('popup-loc').textContent   = ev.location ? '📍 ' + ev.location : '';
  document.getElementById('popup-desc').textContent  = ev.description
    ? ev.description.replace(/<[^>]+>/g,'').substring(0,250) : '';
  document.getElementById('popup-overlay').style.display = 'block';
  document.getElementById('event-popup').style.display   = 'block';
}
function hidePopup() {
  document.getElementById('popup-overlay').style.display = 'none';
  document.getElementById('event-popup').style.display   = 'none';
}

/* ══════════════════════════════════════════
   PULSANTI NAVIGAZIONE VISTA
══════════════════════════════════════════ */
function setActiveBtn(id) {
  ['btn-oggi-btn','btn-list','btn-grid'].forEach(b => document.getElementById(b).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('btn-oggi-btn').addEventListener('click', () => {
  currentView = 'oggi';
  setActiveBtn('btn-oggi-btn');
  // torna al mese corrente se necessario
  const now = new Date();
  if (currentYear !== now.getFullYear() || currentMonth !== now.getMonth()) {
    currentYear = now.getFullYear(); currentMonth = now.getMonth();
    updateLabel(); loadEvents();
  } else {
    renderCurrent();
  }
});
document.getElementById('btn-list').addEventListener('click', () => {
  currentView = 'list';
  setActiveBtn('btn-list');
  renderCurrent();
});
document.getElementById('btn-grid').addEventListener('click', () => {
  currentView = 'grid';
  setActiveBtn('btn-grid');
  renderCurrent();
});

document.getElementById('popup-close').addEventListener('click', hidePopup);
document.getElementById('popup-overlay').addEventListener('click', hidePopup);

/* ══════════════════════════════════════════
   AVVIO — default: vista Oggi
══════════════════════════════════════════ */
setActiveBtn('btn-oggi-btn');
updateLabel();
loadEvents();
</script>
